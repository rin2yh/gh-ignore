name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.1.0)'
        required: true
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - name: Validate version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$VERSION" &>/dev/null; then
            echo "Error: release $VERSION already exists"
            exit 1
          fi
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -o dist/linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -o dist/darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -o dist/darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o dist/windows-amd64.exe .
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --generate-notes dist/*
